<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <style>
    .axis{stroke:#4A4F59;stroke-width:1.5;}
    .axlbl{font-size:15px;fill:#444;}
    .curveB{fill:none;stroke:#3B6FB6;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;}
    .curveG{fill:none;stroke:#2E8B57;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;}
    .note{font-size:14.5px;}
    .sch{font-size:13px;fill:#9AA2AE;font-style:italic;}
  </style>

  <!-- axes -->
  <line class="axis" x1="120" y1="66" x2="120" y2="352"/>
  <line class="axis" x1="120" y1="352" x2="898" y2="352"/>
  <text class="axlbl" x="66" y="212" transform="rotate(-90 66 212)" text-anchor="middle">measured alignment</text>
  <text class="axlbl" x="510" y="404" text-anchor="middle">test-time information &#8594; more frames, more captions</text>
  <text class="sch" x="884" y="80" text-anchor="end">schematic &#8212; not measured values</text>

  <!-- framewise image baseline (plateaus) -->
  <polyline class="curveB" points="140,320 240,282 360,260 500,249 660,243 862,240"/>
  <g fill="#3B6FB6">
    <circle cx="140" cy="320" r="3.2"/><circle cx="240" cy="282" r="3.2"/><circle cx="360" cy="260" r="3.2"/>
    <circle cx="500" cy="249" r="3.2"/><circle cx="660" cy="243" r="3.2"/><circle cx="862" cy="240" r="3.2"/>
  </g>
  <text class="note" x="632" y="300" fill="#3B6FB6" font-weight="600">framewise image baseline</text>
  <text class="note" x="632" y="318" fill="#3B6FB6">plateaus once the benchmark stops asking for time</text>

  <!-- richer video-text probe (keeps rising) -->
  <polyline class="curveG" points="140,324 240,270 360,228 500,190 660,158 862,126"/>
  <g fill="#2E8B57">
    <circle cx="140" cy="324" r="3.2"/><circle cx="240" cy="270" r="3.2"/><circle cx="360" cy="228" r="3.2"/>
    <circle cx="500" cy="190" r="3.2"/><circle cx="660" cy="158" r="3.2"/><circle cx="862" cy="126" r="3.2"/>
  </g>
  <text class="note" x="250" y="114" fill="#2E8B57" font-weight="600">richer video&#8211;text probe</text>
  <text class="note" x="250" y="134" fill="#2E8B57">more frames &amp; captions keep constraining the event</text>

  <!-- probe-richness ticks: few frames -> many frames -->
  <g fill="none" stroke="#7C8794" stroke-width="1.3">
    <rect x="150" y="362" width="16" height="12" rx="1.5"/>
    <g><rect x="440" y="362" width="16" height="12" rx="1.5"/><rect x="450" y="366" width="16" height="12" rx="1.5"/></g>
    <g><rect x="740" y="362" width="16" height="12" rx="1.5"/><rect x="750" y="366" width="16" height="12" rx="1.5"/><rect x="760" y="370" width="16" height="12" rx="1.5"/></g>
  </g>
</svg>
