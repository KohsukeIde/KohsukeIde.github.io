<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2E8B57"/></marker>
    <marker id="ah-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#C65A4A"/></marker>
    <symbol id="door" viewBox="0 0 24 24">
      <rect x="6" y="3" width="12" height="18" rx="1.5" fill="#fff" stroke="currentColor" stroke-width="1.7"/>
      <circle cx="14.7" cy="12" r="1.1" fill="currentColor"/>
    </symbol>
    <symbol id="person" viewBox="0 0 24 24">
      <circle cx="12" cy="7" r="3.2" fill="#fff" stroke="currentColor" stroke-width="1.7"/>
      <path d="M5.5 20 c0 -4.6 3 -7.2 6.5 -7.2 s6.5 2.6 6.5 7.2" fill="#fff" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    </symbol>
  </defs>
  <style>
    .frm{fill:#fff;stroke-width:2.1;}
    .cap{font-size:16px;font-weight:600;}
    .sub{font-size:14px;fill:#5b6270;}
    .chip{stroke-width:2;}
  </style>

  <!-- ===== LEFT: two orderings that share the same words ===== -->
  <!-- forward (green) -->
  <rect class="frm" x="70"  y="66" width="86" height="78" rx="9" stroke="#2E8B57"/>
  <use href="#door"   x="92"  y="82" width="42" height="42" style="color:#2E8B57"/>
  <line x1="160" y1="105" x2="196" y2="105" stroke="#2E8B57" stroke-width="2" marker-end="url(#ah-green)"/>
  <rect class="frm" x="200" y="66" width="86" height="78" rx="9" stroke="#2E8B57"/>
  <use href="#person" x="222" y="82" width="42" height="42" style="color:#2E8B57"/>
  <text class="cap" x="178" y="168" text-anchor="middle" fill="#2E8B57">open the door, then enter</text>

  <!-- reversed (red) -->
  <rect class="frm" x="70"  y="222" width="86" height="78" rx="9" stroke="#C65A4A"/>
  <use href="#person" x="92"  y="238" width="42" height="42" style="color:#C65A4A"/>
  <line x1="160" y1="261" x2="196" y2="261" stroke="#C65A4A" stroke-width="2" marker-end="url(#ah-red)"/>
  <rect class="frm" x="200" y="222" width="86" height="78" rx="9" stroke="#C65A4A"/>
  <use href="#door"   x="222" y="238" width="42" height="42" style="color:#C65A4A"/>
  <text class="cap" x="178" y="324" text-anchor="middle" fill="#C65A4A">enter, then open the door</text>

  <!-- tie: same words / opposite event -->
  <path d="M312 96 q16 0 16 16 v52 q0 16 16 16 q-16 0 -16 16 v52 q0 16 -16 16" fill="none" stroke="#C9CFDA" stroke-width="1.6"/>
  <text class="sub" x="352" y="176" font-weight="600" fill="#333">same nouns &amp; verbs</text>
  <text class="sub" x="352" y="196">reversed order &#8594;</text>
  <text class="sub" x="352" y="214" font-weight="600" fill="#C65A4A">a different event</text>

  <!-- ===== divider ===== -->
  <line x1="560" y1="52" x2="560" y2="360" stroke="#E4E7EC" stroke-width="1.5"/>

  <!-- ===== RIGHT: what each metric says ===== -->
  <text class="sub" x="740" y="86" text-anchor="middle" font-weight="600" fill="#333">How close does each metric call them?</text>

  <rect x="612" y="118" width="256" height="66" rx="12" fill="#EEF4FF" stroke="#3B6FB6" class="chip"/>
  <text class="cap" x="740" y="146" text-anchor="middle" fill="#3B6FB6">object / bag-of-words metric</text>
  <text class="sub" x="740" y="168" text-anchor="middle" fill="#3B6FB6">shares the words &#8594; scored as <tspan font-weight="700">near</tspan></text>

  <rect x="612" y="212" width="256" height="66" rx="12" fill="#F2FBF5" stroke="#2E8B57" class="chip"/>
  <text class="cap" x="740" y="240" text-anchor="middle" fill="#2E8B57">event-structure metric</text>
  <text class="sub" x="740" y="262" text-anchor="middle" fill="#2E8B57">order and cause differ &#8594; should be <tspan font-weight="700">far</tspan></text>

  <text class="sub" x="740" y="326" text-anchor="middle">a real temporal model must pull these <tspan font-weight="700">apart</tspan></text>
</svg>
