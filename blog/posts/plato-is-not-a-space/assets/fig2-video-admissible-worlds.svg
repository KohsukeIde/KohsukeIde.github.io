<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3B6FB6"/>
    </marker>
    <marker id="ah-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2E8B57"/>
    </marker>

    <symbol id="cup" viewBox="0 0 24 24">
      <ellipse cx="11" cy="8" rx="8" ry="2.4" fill="#ffffff" stroke="currentColor" stroke-width="1.6"/>
      <path d="M3 8 h16 l-1.5 11 a2 2 0 0 1 -2 1.8 h-9 a2 2 0 0 1 -2 -1.8 z" fill="#ffffff" stroke="currentColor" stroke-width="1.6"/>
      <path d="M19 10 a4.6 4.6 0 0 1 3 6 a4 4 0 0 1 -3.5 2.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
    </symbol>

    <symbol id="hand" viewBox="0 0 24 24">
      <path d="M6.5 14.5 v-4.5 a1.5 1.5 0 0 1 3 0 v3.5 M9.5 13 v-6 a1.5 1.5 0 0 1 3 0 v6 M12.5 13 v-6.5 a1.5 1.5 0 0 1 3 0 v6.5 M15.5 13.5 v-4 a1.5 1.5 0 0 1 3 0 v7 c0 4.2 -2.8 6.8 -7 6.8 h-1 c-2.7 0 -4.2 -1.2 -5.7 -3.3 l-2.3 -3.3 a1.6 1.6 0 0 1 2.4 -2.1 l1.6 1.7 z"
            fill="#ffffff" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </symbol>
  </defs>

  <style>
    .static { color:#3B6FB6; }
    .event  { color:#2E8B57; }
    .lbl    { font-size:16px; fill:#333; }
    .cap    { font-size:16px; font-weight:600; }
    .var    { font-size:14px; fill:#8A93A0; font-style:italic; }
    .tstep  { font-size:14px; fill:#2E8B57; }
    .pill   { fill:#ffffff; stroke:#D6DBE4; stroke-width:1.6; }
    .table  { stroke:#B9C0CC; stroke-width:1.8; stroke-linecap:round; }
  </style>

  <!-- ============ LEFT: single frame -> many admissible events ============ -->
  <!-- frame card -->
  <rect x="42" y="150" width="164" height="146" rx="12" fill="#EEF4FF" stroke="#3B6FB6" stroke-width="2.4"/>
  <line class="table" x1="60" y1="266" x2="188" y2="266"/>
  <use href="#cup"  x="82"  y="224" width="46" height="46" class="static"/>
  <use href="#hand" x="120" y="220" width="56" height="56" class="static"/>
  <text x="124" y="322" text-anchor="middle" class="cap static">single frame</text>
  <text x="124" y="342" text-anchor="middle" class="var">I&#8348;</text>

  <!-- outcome pills -->
  <g>
    <g transform="translate(250,40)"><rect class="pill" width="186" height="34" rx="17"/><text x="93" y="22" text-anchor="middle" class="lbl">reaching for it</text></g>
    <g transform="translate(250,110)"><rect class="pill" width="186" height="34" rx="17"/><text x="93" y="22" text-anchor="middle" class="lbl">setting it down</text></g>
    <g transform="translate(250,180)"><rect class="pill" width="186" height="34" rx="17"/><text x="93" y="22" text-anchor="middle" class="lbl">wiping the table</text></g>
    <g transform="translate(250,250)"><rect class="pill" width="186" height="34" rx="17"/><text x="93" y="22" text-anchor="middle" class="lbl">about to spill it</text></g>
    <g transform="translate(250,320)"><rect class="pill" width="186" height="34" rx="17"/><text x="93" y="22" text-anchor="middle" class="lbl">serving a drink</text></g>
  </g>
  <!-- fan-out dashed arrows -->
  <g fill="none" stroke="#3B6FB6" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#ah-blue)">
    <path d="M208 214 C 228 120, 232 70, 246 57"/>
    <path d="M208 220 C 230 180, 232 140, 246 127"/>
    <path d="M210 223 L 246 197"/>
    <path d="M208 230 C 230 250, 232 250, 246 267"/>
    <path d="M208 236 C 228 320, 232 320, 246 337"/>
  </g>
  <text x="270" y="432" text-anchor="middle" class="cap static">many admissible events</text>

  <!-- ============ divider ============ -->
  <line x1="474" y1="44" x2="474" y2="430" stroke="#E4E7EC" stroke-width="1.5"/>

  <!-- ============ RIGHT: three-frame strip -> one event ============ -->
  <!-- sprocket bands -->
  <g fill="#DDE4DC">
    <!-- top -->
    <rect x="512" y="150" width="322" height="10" rx="2"/>
    <rect x="512" y="256" width="322" height="10" rx="2"/>
  </g>
  <g fill="#F5F8F5">
    <rect x="519" y="152" width="8" height="6"/><rect x="539" y="152" width="8" height="6"/><rect x="559" y="152" width="8" height="6"/>
    <rect x="579" y="152" width="8" height="6"/><rect x="599" y="152" width="8" height="6"/><rect x="619" y="152" width="8" height="6"/>
    <rect x="639" y="152" width="8" height="6"/><rect x="659" y="152" width="8" height="6"/><rect x="679" y="152" width="8" height="6"/>
    <rect x="699" y="152" width="8" height="6"/><rect x="719" y="152" width="8" height="6"/><rect x="739" y="152" width="8" height="6"/>
    <rect x="759" y="152" width="8" height="6"/><rect x="779" y="152" width="8" height="6"/><rect x="799" y="152" width="8" height="6"/><rect x="819" y="152" width="8" height="6"/>
    <rect x="519" y="258" width="8" height="6"/><rect x="539" y="258" width="8" height="6"/><rect x="559" y="258" width="8" height="6"/>
    <rect x="579" y="258" width="8" height="6"/><rect x="599" y="258" width="8" height="6"/><rect x="619" y="258" width="8" height="6"/>
    <rect x="639" y="258" width="8" height="6"/><rect x="659" y="258" width="8" height="6"/><rect x="679" y="258" width="8" height="6"/>
    <rect x="699" y="258" width="8" height="6"/><rect x="719" y="258" width="8" height="6"/><rect x="739" y="258" width="8" height="6"/>
    <rect x="759" y="258" width="8" height="6"/><rect x="779" y="258" width="8" height="6"/><rect x="799" y="258" width="8" height="6"/><rect x="819" y="258" width="8" height="6"/>
  </g>

  <!-- frame 1: approach -->
  <rect x="512" y="160" width="100" height="96" fill="#F2FBF5" stroke="#2E8B57" stroke-width="2.2"/>
  <line class="table" x1="522" y1="236" x2="602" y2="236"/>
  <use href="#cup"  x="524" y="204" width="36" height="36" class="event"/>
  <use href="#hand" x="576" y="204" width="40" height="40" class="event"/>
  <text x="562" y="284" text-anchor="middle" class="tstep">t&#8321; approach</text>

  <!-- frame 2: contact -->
  <rect x="623" y="160" width="100" height="96" fill="#F2FBF5" stroke="#2E8B57" stroke-width="2.2"/>
  <line class="table" x1="633" y1="236" x2="713" y2="236"/>
  <use href="#cup"  x="648" y="204" width="36" height="36" class="event"/>
  <use href="#hand" x="676" y="203" width="40" height="40" class="event"/>
  <text x="673" y="284" text-anchor="middle" class="tstep">t&#8322; contact</text>

  <!-- frame 3: lift -->
  <rect x="734" y="160" width="100" height="96" fill="#F2FBF5" stroke="#2E8B57" stroke-width="2.2"/>
  <line class="table" x1="744" y1="236" x2="824" y2="236"/>
  <use href="#cup"  x="756" y="182" width="36" height="36" class="event"/>
  <use href="#hand" x="784" y="184" width="40" height="40" class="event"/>
  <text x="784" y="284" text-anchor="middle" class="tstep">t&#8323; lift</text>

  <!-- inter-frame arrows -->
  <g stroke="#2E8B57" stroke-width="1.8" marker-end="url(#ah-green)">
    <line x1="613" y1="208" x2="623" y2="208"/>
    <line x1="724" y1="208" x2="734" y2="208"/>
  </g>

  <!-- strip -> event -->
  <path d="M673 300 L673 328" fill="none" stroke="#2E8B57" stroke-width="1.8" marker-end="url(#ah-green)"/>
  <rect x="586" y="330" width="176" height="44" rx="22" fill="#F2FBF5" stroke="#2E8B57" stroke-width="2.2"/>
  <text x="674" y="358" text-anchor="middle" class="cap event">pick up the cup</text>
  <text x="674" y="398" text-anchor="middle" class="tstep">identity &#183; order &#183; contact &#183; state change</text>
  <text x="674" y="432" text-anchor="middle" class="cap event">one event</text>
</svg>
